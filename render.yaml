services:
  - type: web
    name: daily-visitor-counter-api
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./daily-visitor-counter/Dockerfile
    dockerContext: ./daily-visitor-counter
    healthCheckPath: /health
    maxShutdownDelaySeconds: 30
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 3000
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: daily-visitor-counter-redis
          property: connectionString
      - key: APP_TIMEZONE
        value: Asia/Kolkata
      - key: VISITOR_HASH_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: http://localhost:5173,http://localhost:3000,https://transportaion-helper.vercel.app

  - type: keyvalue
    name: daily-visitor-counter-redis
    plan: free
    region: singapore
    ipAllowList: []
    maxmemoryPolicy: noeviction
